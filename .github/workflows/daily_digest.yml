name: Daily SCMP News Digest

on:
  schedule:
    - cron: '15 3 * * *'  # Runs daily at 03:15 UTC / 8:45 AM IST (targets 9:00 AM delivery accounting for queue delays)
  workflow_dispatch:      # Allows manual trigger from the GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scmp_newsletter_agent/requirements.txt

      - name: Run orchestrator pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python -m scmp_newsletter_agent.orchestrator
