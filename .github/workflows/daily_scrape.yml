name: Daily News Scraper

on:
  schedule:
    # Run daily at 03:30 AM UTC (09:00 AM IST)
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests python-dotenv openai

      - name: Run Aggregator Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python tech_addict/aggregator.py

      - name: Commit and Push Database Updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tech_addict/data/news_data.json
          
          # Check if there are any changes to commit
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore: automated daily news update [skip ci]"
            git push
          fi
